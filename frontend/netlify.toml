# Netlify deployment configuration for Aether AI Hub (Frontend)

[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  VITE_API_BASE_URL = "https://aether-ai-hub-api.onrender.com"
  NODE_VERSION = "20"

# SPA fallback: all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache hashed static assets for 1 year
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
